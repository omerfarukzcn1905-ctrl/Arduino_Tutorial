name: Build & Deploy Web (GitHub Pages)

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Flutter SDK
        run: |
          wget -q https://storage.googleapis.com/flutter_infra_release/releases/stable/linux/flutter_linux_3.41.4-stable.tar.xz
          tar xf flutter_linux_3.41.4-stable.tar.xz
          echo "${PWD}/flutter/bin" >> $GITHUB_PATH

      - name: Install dependencies
        working-directory: arduino_tutorial
        run: flutter pub get

      - name: Build web
        working-directory: arduino_tutorial
        run: |
          flutter build web --release \
            --dart-define=API_URL=${{ secrets.API_URL }}

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: arduino_tutorial/build/web
